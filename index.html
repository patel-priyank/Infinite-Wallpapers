<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Wallpapers</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.5.0/font/bootstrap-icons.min.css"
      integrity="sha512-xnP2tOaCJnzp2d2IqKFcxuOiVCbuessxM6wuiolT9eeEJCyy0Vhcwa4zQvdrZNVqlqaxXhHqsSV1Ww7T2jSCUQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <!-- Title -->
    <h1>Infinite Wallpapers</h1>

    <!-- Loader -->
    <div class="loader" id="loader">
      <img src="./loader.svg" alt="Loading ..." />
    </div>

    <!-- Image Container -->
    <div class="image-container" id="image-container"></div>

    <!-- Browse code -->
    <span class="github" id="github" title="Browse code">
      <i class="bi bi-github"></i>
      <span class="browse-code-text">Browse Code</span>
    </span>

    <!-- Scroll to top -->
    <span class="scroll-to-top" id="scroll-to-top" title="Scroll to top" hidden>
      <i class="bi bi-arrow-up-square-fill"></i>
    </span>

    <!-- Script -->
    <script src="./script.js"></script>
  </body>
</html>
